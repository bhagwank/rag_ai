services:

  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: rag-api

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./uploads:/app/uploads
      - ./documents:/app/documents
      - ./chroma_db:/app/chroma_db
      - ./logs:/app/logs

    depends_on:
      - ollama

    restart: unless-stopped

    networks:
      - rag-network

  ollama:

    image: ollama/ollama:latest

    container_name: ollama

    ports:
      - "11434:11434"

    volumes:
      - ollama_data:/root/.ollama

    restart: unless-stopped

    networks:
      - rag-network

volumes:

  ollama_data:

networks:

  rag-network: