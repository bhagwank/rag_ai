apiVersion: apps/v1
kind: Deployment

metadata:
  name: ollama
  namespace: rag-ai

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ollama

  template:

    metadata:
      labels:
        app: ollama

    spec:

      containers:

      - name: ollama

        image: ollama/ollama:latest

        ports:
        - containerPort: 11434

        volumeMounts:
        - name: ollama-storage
          mountPath: /root/.ollama

        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"

          limits:
            memory: "6Gi"
            cpu: "3000m"

      volumes:

      - name: ollama-storage

        persistentVolumeClaim:

          claimName: ollama-pvc